name: Build LaTeX Document

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          # The action uses latexmk by default, which automatically handles
          # multiple compilations for cross-references and bibliography.
          
      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Protocolo_Doctorado_PDF
          path: main.pdf

      - name: Create Release and Upload PDF
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: Release
          name: "Última Versión del Protocolo"
          files: main.pdf
          body: "Versión más reciente compilada del protocolo de tesis doctoral."
          make_latest: true
